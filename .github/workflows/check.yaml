name: Check & Test

on:
  workflow_dispatch:
    # Allow manual triggering of this workflow
    inputs:
      run-id:
        type: string
        description: "Workflow run ID"
        required: false
      dry-run:
        type: boolean
        description: "Skip release steps"
        required: false
        default: true
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - dev

jobs:
  lint:
    # Runs once per push, since linting doesn't depend on Python version
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Lint
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0

  typecheck:
    # Runs once per supported Python language version,
    # since types can vary by version
    # (I don't think they can vary by freethreading support)
    name: Type-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        # NOTE: If we ever add Direct3D-backed video drivers,
        # we may want to do type-checking on Windows as well
        # (to handle both Direct3D APIs and their absence).
    steps:
      - name: Check Out Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install Build Requirements
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libx11-dev

      - name: Install Python and Dependencies
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "${{ matrix.python-version }}"
          cache: "pip"
          # --no-build-isolation skips the scikit-build-core CMake step;
          # pyright only needs the Python imports.
          pip-install: ".[all] --group dev"
        env:
          SKBUILD_CMAKE_DEFINE: "LIBRETRO_PY_BUILD_CORES=OFF"

      - name: Run pyright
        run: just typecheck

  # -- Documentation build (Linux + most recent stable Python) ------------- #

  build-docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Install Build Requirements
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libx11-dev

      - name: Install Python and Dependencies
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"
          pip-install: ".[all] --group docs"
        env:
          SKBUILD_CMAKE_DEFINE: "LIBRETRO_PY_BUILD_CORES=OFF"

      - name: Build docs
        run: just build-docs

  # -- Build platform wheels (one per OS/arch) + a pure-Python fallback ---- #

  build-platform-wheels:
    name: Build wheel (${{ matrix.python }}-${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        python:
          - "cp312"
          - "cp313"
          - "cp314"
          - "cp314t"
          - "cp315"
          - "cp315t"
        platform:
          - win_amd64
          - win_arm64
          - macosx_x86_64
          - macosx_arm64
          - manylinux_x86_64
          - manylinux_aarch64
        include:
          # Specify the runners for each platform
          # (GHA will add a "runner" field to the jobs with the given "platform" field)
          - platform: win_amd64
            runner: windows-latest
          - platform: win_arm64
            runner: windows-11-arm
          - platform: macosx_x86_64
            runner: macos-26-intel
          - platform: macosx_arm64
            runner: macos-latest
          - platform: manylinux_x86_64
            runner: ubuntu-latest
          - platform: manylinux_aarch64
            runner: ubuntu-24.04-arm

          # Allow these jobs to fail, since they're not fully supported yet
          # (Python 3.15 is in beta as of now)
          - python: cp315
            experimental: true
          - python: cp315t
            experimental: true

    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - name: Check Out Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: cores-${{ matrix.platform }}
          create-symlink: true
          variant: ${{ runner.os == 'Windows' && 'sccache' || 'ccache' }} # Equivalent to (runner.os == 'Windows') ? 'sccache' : 'ccache'
          # Using sccache on Windows due to https://github.com/hendrikmuhs/ccache-action/issues/112
          verbose: 2
          evict-old-files: job

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/cibw-cache
          key: cibw-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            cibw-${{ runner.os }}-

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          CIBW_ENABLE: ${{ matrix.experimental && 'cpython-prerelease' || '' }}
          CIBW_BEFORE_ALL_LINUX: yum install -y ccache libjpeg-turbo-devel
          CIBW_CONFIG_SETTINGS: "cmake.args=-GNinja;-DCMAKE_C_COMPILER_LAUNCHER=ccache;-DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
          # TODO: How to ensure the ccache directory in the cibw container is exposed to the host?
          CIBW_CONFIG_SETTINGS_WINDOWS: "cmake.args=-GNinja;-DCMAKE_C_COMPILER=gcc;-DCMAKE_CXX_COMPILER=g++;-DCMAKE_C_COMPILER_LAUNCHER=sccache;-DCMAKE_CXX_COMPILER_LAUNCHER=sccache"
          CIBW_CACHE_PATH: ${{ runner.temp }}/cibw-cache
        with:
          only: "${{ matrix.python }}-${{ matrix.platform }}"

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.python }}-${{ matrix.platform }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-pure-wheel:
    name: Build pure-Python fallback wheel
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install build front-end
        run: pip install build

      - name: Build pure-Python wheel
        # ``LIBRETRO_PY_PURE_PYTHON`` triggers a scikit-build-core override
        # in ``pyproject.toml`` that disables the CMake step entirely so the
        # resulting wheel is tagged ``py3-none-any``.
        env:
          LIBRETRO_PY_PURE_PYTHON: "1"
        run: python -m build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-pure
          path: dist/*-py3-none-any.whl
          if-no-files-found: error
