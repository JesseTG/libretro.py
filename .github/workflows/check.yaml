name: Check & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - dev

jobs:
  check:
    name: Run Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test against multiple Python versions to ensure compatibility
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Check Out Sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # To ensure we have all tags

      - name: Install Just
        uses: extractions/setup-just@c26183993cea0054160ffaaa55fab2cad53c12fc # v3.1.0

      - name: Install Build Requirements
        run: sudo apt-get install libx11-dev

      - name: Install Python and Dependencies
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          pip-install: .[all]

      - name: Check Types
        run: just pyright

      - name: Check Style
        run: just black-check isort-check